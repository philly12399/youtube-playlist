<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Playlist Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/grids-responsive-min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎵 YouTube Playlist Manager</h1>
            <a href="https://github.com/cytsunny/youtube-playlist/" class="pure-button pure-button-primary github-link" target="_blank">
                <i>📂</i> Github Repository
            </a>
        </header>

        <div class="pure-g top-section">
            <div class="pure-u-1 pure-u-lg-2-3">
                <div class="video-container">
                    <div id="video-youtube"></div>
                </div>
            </div>
            <div class="pure-u-1 pure-u-lg-1-3">
                <div class="playlist-panel">
                    <h2>📋 Current Playlist</h2>
                    <div id="play-list" class="playlist-items"></div>
                </div>
            </div>
        </div>

        <div class="pure-g">
            <div class="pure-u-1 pure-u-md-1-2">
                <div class="panel">
                    <h2>💾 Exportable Playlist</h2>
                    <textarea id="playlist-object" class="pure-input-1" rows="15"></textarea>
                    <button id="update-button" class="pure-button pure-button-primary pure-button-block">
                        🔄 Update and Play from Beginning
                    </button>
                </div>
            </div>
            <div class="pure-u-1 pure-u-md-1-2">
                <div class="panel">
                    <h2>➕ Add New Video Clip</h2>
                    <form id="add-form" class="pure-form pure-form-stacked">
                        <fieldset>
                            <label for="youtube-link">YouTube Link</label>
                            <input type="text" id="youtube-link" class="pure-input-1" placeholder="https://www.youtube.com/watch?v=...">
                            
                            <label>Start Time</label>
                            <div class="time-inputs">
                                <input type="number" name="start-time-hour" value="0" min="0" placeholder="HH">
                                <span>:</span>
                                <input type="number" name="start-time-minute" value="0" min="0" max="59" placeholder="MM">
                                <span>:</span>
                                <input type="number" name="start-time-second" value="0" min="0" max="59" placeholder="SS">
                            </div>
                            
                            <label>End Time</label>
                            <div class="time-inputs">
                                <input type="number" name="end-time-hour" value="0" min="0" placeholder="HH">
                                <span>:</span>
                                <input type="number" name="end-time-minute" value="0" min="0" max="59" placeholder="MM">
                                <span>:</span>
                                <input type="number" name="end-time-second" value="0" min="0" max="59" placeholder="SS">
                            </div>
                            
                            <button type="submit" id="add-button" class="pure-button pure-button-primary pure-button-block">
                                ➕ Add to Playlist
                            </button>
                        </fieldset>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script id="youtube-tracking-script" src="script.js"></script>
</body>
</html>
