<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Playlist Manager</title>
    <link rel="icon" type="image/png" href="Logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/grids-responsive-min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 id="main-video-title" class="main-video-title">YouTube Playlist Manager</h1>
        <h2 id="current-track-title" class="current-track-title"></h2>
        <div class="pure-g top-section">
            <div class="pure-u-1 pure-u-lg-2-3">
                <div class="video-container">
                    <div id="video-youtube"></div>
                    <div id="audio-only-mask" class="audio-only-mask" aria-hidden="true"></div>
                </div>
            </div>
            <div class="pure-u-1 pure-u-lg-1-3">
                <div class="playlist-panel">
                    <h2>🎤 Current Playlist</h2>
                    <div class="playlist-controls">
                        <button id="prev-button" type="button" class="pure-button">⏮ Prev (Z)</button>
                        <button id="play-pause-button" type="button" class="pure-button">⏯ Play/Pause (Space)</button>
                        <button id="next-button" type="button" class="pure-button">⏭ Next (X)</button>
                    </div>
                    <button id="audio-only-button" type="button" class="pure-button pure-button-block">🎧 Audio Only: Off (C)</button>
                    <div id="play-list" class="playlist-items"></div>
                </div>
            </div>
        </div>

        <div class="pure-g">
            <div class="pure-u-1 pure-u-md-1-2">
                <div class="panel">
                    <h2>🎵 Input Playlist</h2>
                    <label for="input-mode">Input Mode</label>
                    <select id="input-mode" class="pure-input-1">
                        <option value="json">JSON</option>
                        <option value="text" selected>Text</option>
                    </select>

                    <div id="json-mode-panel">
                        <label for="playlist-object">Playlist JSON</label>
                        <textarea id="playlist-object" class="pure-input-1" rows="15"></textarea>
                    </div>

                    <div id="text-mode-panel" style="display: none;">
                        <label for="playlist-video-url">Video URL</label>
                        <input type="text" id="playlist-video-url" class="pure-input-1" placeholder="https://www.youtube.com/watch?v=...">

                        <label for="playlist-timelines">Timeline Text</label>
                        <textarea id="playlist-timelines" class="pure-input-1" rows="10" placeholder="01. 00:03:08 ~ only my railgun"></textarea>
                    </div>

                    <button id="update-button" class="pure-button pure-button-primary pure-button-block">
                        🔄 Update and Play
                    </button>
                    <button id="save-playlist-button" class="pure-button pure-button-primary pure-button-block">💾 Save Playlist to Library</button>
                    <button id="import-button" class="pure-button pure-button-block">
                        📥 Import Playlist
                    </button>
                    <button id="export-button" class="pure-button pure-button-block">
                        📤 Export Playlist
                    </button>
                    <input id="import-file-input" type="file" accept=".json,application/json" style="display: none;">
                </div>
            </div>
            <div class="pure-u-1 pure-u-md-1-2">
                <div class="panel library-panel">
                    <h2 id="library-toggle" style="cursor: pointer; user-select: none;">
                        <span id="library-toggle-icon" style="display: inline-block; transition: transform 0.2s; font-size: 0.7em;">▼</span> 📂 Playlists Library
                    </h2>
                    <div id="library-content">
                        <div id="library-list" class="playlist-items library-items">
                            <!-- Library items will be rendered here -->
                        </div>
                        <button id="import-library-button" class="pure-button pure-button-block">📥 Import to Library</button>
                        <button id="export-library-button" class="pure-button pure-button-block">📤 Export Entire Library</button>
                        <input id="import-library-input" type="file" accept=".json,application/json" multiple style="display: none;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-notification" class="toast-hidden"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script id="youtube-tracking-script" src="script.js"></script>
</body>
</html>
